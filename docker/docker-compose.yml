version: '3.9'

services:
  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: dealvault_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      # Using MongoDB Atlas URI from .env (passed via env_file)
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_COOKIE_EXPIRES_IN: ${JWT_COOKIE_EXPIRES_IN:-7}
      # Allow requests from the frontend container (port 80 → Next.js on 3000)
      CORS_ORIGIN: http://localhost,http://localhost:3000,http://localhost:80
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_xxxxx}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-zzz_test_xxxxx}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:5000/api/auth/github/callback}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    volumes:
      - uploads_data:/app/uploads

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        # At build time the browser hits /api which nginx proxies to backend.
        # In Docker the frontend is a Next.js server, so API calls go to backend service.
        NEXT_PUBLIC_API_URL: http://backend:5000/api
    container_name: dealvault_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  uploads_data:
    driver: local
